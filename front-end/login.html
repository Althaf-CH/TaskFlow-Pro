<!DOCTYPE html>
<html>
<head>
    <title>TaskFlow Pro - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

    <h1>TaskFlow Pro</h1>

    <form id="loginForm">

        <input
            type="email"
            id="loginEmail"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="register.html">Register</a>
    </p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
